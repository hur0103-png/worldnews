name: Render Keep Alive

on:
  schedule:
    - cron: '*/10 * * * *' # 매 10분마다 실행
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Server
        # 아래 URL의 주소를 Render에서 발급받은 실제 주소로 반드시 변경하세요!
        run: curl -s https://worldnews-clipper.onrender.com/api/progress > /dev/null || exit 0
