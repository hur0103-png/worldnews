name: Render Keep Alive

on:
  schedule:
    - cron: '*/5 * * * *' # 매 5분마다 실행 (조금 더 자주)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Server
        run: curl -s "https://worldnews-clipper.onrender.com/api/progress?t=$(date +%s)" > /dev/null || exit 0
