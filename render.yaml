services:
  - type: web
    name: worldnews-clipper
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: worldnews-db
          property: connectionString

databases:
  - name: worldnews-db
    databaseName: worldnews
    user: worldnews_user
